# dnsmasq configuration for local development wildcard DNS.
# Resolves *.localhost to 127.0.0.1 so any subdomain can be used as a local
# hostname without touching /etc/hosts.
#
# macOS: dot installs /etc/resolver/localhost to route .localhost queries here.
# Linux: dot configures systemd-resolved or resolvconf to forward .localhost here.

# Only listen on loopback — never expose this to the network.
listen-address=127.0.0.1
bind-interfaces

# Wildcard: all *.localhost subdomains resolve to localhost.
address=/localhost/127.0.0.1

# Use a non-standard port so dnsmasq can run as the current user without root.
# The OS resolver drop-in (managed by dot) points .local.dev queries at this port.
port=5353
