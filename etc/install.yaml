link_paths:
  - .ackrc
  - .psqlrc
  - .gitconfig
  - .gitconfig.dusktreader
  - .systemd-env
  - .agents
  - .config/terminator
  - .config/nvim/init.lua
  - .config/nvim/lua
  - .config/oh-my-posh/dusktreader.omp.yaml
  - .config/opencode/AGENTS.md
  - .config/opencode/agents
  - .config/ghostty
copy_paths:
  - path: .ssh/config.base
    perms: 0o600
  - path: .ssh/rc
    perms: 0o600
dotfile_paths:
  - .dot_misc
  - .dot_tools_helpers
  - .dot_colors
  - .dotrc
  - .dot_zshrc
mkdir_paths:
  - .vim/local/backup
  - .vim/local/swap
  - .vim/undodir
tools:
  - name: build-essentials
    check: "command -v make"
    scripts:
      linux: |
        sudo apt install -y build-essential
  - name: poetry
    check: "command -v poetry"
    scripts:
      generic: |
        uv tool install poetry --python=$PYTHON_VERSION
  - name: unzip
    check: "command -v unzip"
    scripts:
      linux: |
        sudo apt install -y unzip
      darwin: |
        sudo port -N install unzip
  - name: oh-my-posh
    check: "command -v oh-my-posh"
    scripts:
      linux: |
        curl -s https://ohmyposh.dev/install.sh | bash -s
      darwin: |
        sudo port -N install oh-my-posh
  - name: golangci-lint
    check: "command -v golangci-lint"
    scripts:
      linux: |
        sudo snap install golangci-lint --classic
      darwin: |
        sudo port -N install golangci-lint
  - name: ripgrep
    check: "command -v rg"
    scripts:
      linux: |
        sudo apt install -y ripgrep
      darwin: |
        sudo port -N install ripgrep
  - name: fd-find
    check: "command -v fd"
    scripts:
      linux: |
        sudo apt install -y fd-find
      darwin: |
        sudo port -N install fd
  - name: fzf
    check: "command -v fzf"
    scripts:
      linux: |
        sudo apt install -y fzf
      darwin: |
        sudo port -N install fzf
  - name: watch
    check: "command -v watch"
    scripts:
      linux: |
        sudo apt install -y watch
      darwin: |
        sudo port -N install watch
  - name: lynx
    check: "command -v lynx"
    scripts:
      linux: |
        sudo apt install -y lynx
      darwin: |
        sudo port -N install lynx
  - name: nvm
    check: "test -s $HOME/.nvm/nvm.sh"
    scripts:
      generic: |
        GIT_CONFIG_COUNT=1 \
        GIT_CONFIG_KEY_0=url.https://github.com/.insteadOf \
        GIT_CONFIG_VALUE_0=git@github.com: \
        curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
  - name: node
    check: "command -v node"
    scripts:
      generic: |
        . "$HOME/.nvm/nvm.sh"
        nvm install 20
        nvm use 20
  - name: angular
    check: "command -v ng"
    scripts:
      generic: |
        . "$HOME/.nvm/nvm.sh"
        npm install -g @angular/cli
  - name: neovim
    check: "command -v nvim"
    scripts:
      linux: |
        sudo snap install nvim --classic
      darwin: |
        sudo port -N install neovim
  - name: lua
    check: "command -v lua"
    scripts:
      linux: |
        sudo apt install lua5.3
      darwin: |
        sudo port -N install lua
  - name: luarocks
    check: "command -v luarocks"
    scripts:
      linux: |
        ver=$(lua -v | awk '{print $2}' | cut -d. -f1,2)
        sudo apt install -y liblua${ver}-dev && \
        pushd /tmp && \
        wget https://luarocks.org/releases/luarocks-3.12.2.tar.gz && \
        tar zxpf luarocks-3.12.2.tar.gz && \
        cd luarocks-3.12.2 && \
        ./configure --lua-version=5.3 && \
        make && \
        sudo make install && \
        popd
      darwin: |
        sudo port install wget
        pushd /tmp && \
        wget https://luarocks.org/releases/luarocks-3.12.2.tar.gz && \
        tar zxpf luarocks-3.12.2.tar.gz && \
        cd luarocks-3.12.2 && \
        ./configure --lua-version=5.3 && \
        make && \
        sudo make install && \
        popd
  - name: busted
    check: "luarocks list --porcelain 2>/dev/null | grep -q '^busted'"
    scripts:
      generic: |
        sudo luarocks install busted
  - name: rustup
    check: "command -v rustup"
    scripts:
      generic: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | bash -s -- -y
  - name: github cli
    check: "command -v gh"
    scripts:
      linux: |
        (type -p wget >/dev/null || (sudo apt update && sudo apt-get install wget -y)) && \
        sudo mkdir -p -m 755 /etc/apt/keyrings && \
          out=$(mktemp) && \
          wget -nv -O$out https://cli.github.com/packages/githubcli-archive-keyring.gpg && \
          cat $out | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null && \
        sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg && \
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null && \
        sudo apt update && \
        sudo apt install gh -y
      darwin: |
        sudo port -N install gh
  - name: opencode
    check: "command -v opencode"
    scripts:
      generic: |
        curl -fsSL https://opencode.ai/install | bash
  - name: 1password-cli
    check: "command -v op"
    scripts:
      linux: |
        curl -sS https://downloads.1password.com/linux/keys/1password.asc | \
          sudo gpg --dearmor --yes --output /usr/share/keyrings/1password-archive-keyring.gpg && \
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/$(dpkg --print-architecture) stable main" | \
          sudo tee /etc/apt/sources.list.d/1password.list && \
          sudo mkdir -p /etc/debsig/policies/AC2D62742012EA22/ && \
          curl -sS https://downloads.1password.com/linux/debian/debsig/1password.pol | \
          sudo tee /etc/debsig/policies/AC2D62742012EA22/1password.pol && \
          sudo mkdir -p /usr/share/debsig/keyrings/AC2D62742012EA22 && \
          curl -sS https://downloads.1password.com/linux/keys/1password.asc | \
          sudo gpg --dearmor --output /usr/share/debsig/keyrings/AC2D62742012EA22/debsig.gpg && \
          sudo apt update && sudo apt install 1password-cli
      darwin: |
        sudo port -N install 1password-cli
  - name: asdf
    check: "command -v asdf"
    scripts:
      linux: |
        arch=$(uname -m)
        case "$arch" in
          x86_64)  asdf_arch="linux-amd64" ;;
          aarch64) asdf_arch="linux-arm64" ;;
          *)        echo "Unsupported architecture: $arch"; exit 1 ;;
        esac
        latest=$(curl -s https://api.github.com/repos/asdf-vm/asdf/releases/latest | grep '"tag_name"' | sed 's/.*"tag_name": *"\(.*\)".*/\1/')
        curl -fsSL "https://github.com/asdf-vm/asdf/releases/download/${latest}/asdf-${latest}-${asdf_arch}.tar.gz" \
          | sudo tar -xz -C /usr/local/bin asdf
      darwin: |
        sudo port -N install asdf
  - name: asdf-go
    check: "asdf plugin list 2>/dev/null | grep -q '^golang$'"
    depends_on: [asdf]
    scripts:
      generic: |
        asdf plugin add golang https://github.com/asdf-community/asdf-golang.git
        asdf install golang latest
        asdf set -u golang latest
  - name: pgcli
    check: "command -v pgcli"
    scripts:
      linux: |
        sudo apt install libpq-dev python-dev
        uv tool install pgcli
      darwin: |
        sudo port -N install pgcli
  - name: usql
    check: "command -v usql"
    depends_on: [asdf-go]
    scripts:
      linux: |
        go install -tags most github.com/xo/usql@latest
      darwin: |
        sudo port -N install usql
  - name: aws-cli
    check: "command -v aws"
    scripts:
      linux: |
        sudo snap install aws-cli --classic
      darwin: |
        curl "https://awscli.amazonaws.com/AWSCLIV2.pkg" -o "AWSCLIV2.pkg"
        sudo installer -pkg AWSCLIV2.pkg -target /
  - name: devspace
    check: "command -v devspace"
    scripts:
      generic: |
        . "$HOME/.nvm/nvm.sh"
        npm install -g devspace
  - name: goenv
    check: "command -v goenv"
    scripts:
      generic: |
        git clone https://github.com/go-nv/goenv.git ~/.goenv
        echo "export GOENV_PATH_ORDER=front" >> "$HOME/.goenvrc"
  - name: firacode nerdfont
    check: "fc-list | grep -i firacode"
    gui_only: true
    scripts:
      linux: |
        mkdir -p "$HOME/.local/share/fonts"
        curl -fL "https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/FiraCode.zip" -o /tmp/FiraCode.zip
        unzip -jo /tmp/FiraCode.zip "*.ttf" -d "$HOME/.local/share/fonts/FiraCode/"
        rm /tmp/FiraCode.zip
        fc-cache -fv
      darwin: |
        mkdir -p "$HOME/Library/Fonts"
        curl -fL "https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/FiraCode.zip" -o /tmp/FiraCode.zip
        unzip -jo /tmp/FiraCode.zip "*.ttf" -d "$HOME/Library/Fonts/FiraCode"
        rm /tmp/FiraCode.zip
  - name: ghostty
    check: "command -v ghostty"
    gui_only: true
    scripts:
      linux: |
        sudo snap install ghostty --classic
      darwin: s|
        curl -fL "https://release.files.ghostty.org/1.3.1/Ghostty.dmg" -o /tmp/Ghostty.dmg
        hdiutil attach /tmp/Ghostty.dmg -quiet
        cp -R "/Volumes/Ghostty/Ghostty.app" /Applications/
        hdiutil detach "/Volumes/Ghostty" -quiet
        rm /tmp/Ghostty.dmg
  - name: btop
    check: "command -v btop"
    scripts:
      linux: |
        sudo apt install btop
      darwin: s|
        sudo port install btop
  - name: openssh-server
    check: "command -v sshd"
    scripts:
      linux: |
        sudo apt install -y openssh-server
        sudo systemctl enable ssh
        sudo systemctl start ssh
      darwin: |
        sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist
  - name: chrome-headless-shell
    check: "command -v chrome-headless-shell"
    depends_on: [unzip]
    scripts:
      generic: |
        os=$(uname -s); arch=$(uname -m)
        case "$os-$arch" in
          Darwin-arm64)        plat="mac-arm64" ;;
          Darwin-x86_64)       plat="mac-x64" ;;
          Linux-x86_64)        plat="linux64" ;;
          *) echo "Unsupported platform for chrome-headless-shell: $os-$arch"; exit 1 ;;
        esac
        url=$(curl -fsSL https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json \
          | python3 -c "import json,sys; d=json.load(sys.stdin); print(next(x['url'] for x in d['channels']['Stable']['downloads']['chrome-headless-shell'] if x['platform']=='$plat'))")
        dest="$HOME/.local/chrome-headless-shell"
        tmp=$(mktemp -d)
        curl -fsSL "$url" -o "$tmp/chs.zip"
        unzip -q "$tmp/chs.zip" -d "$tmp/extract"
        inner=$(find "$tmp/extract" -maxdepth 1 -type d -name 'chrome-headless-shell-*' | head -1)
        rm -rf "$dest"; mkdir -p "$dest" "$HOME/.local/bin"
        cp -R "$inner"/* "$dest"/
        rm -rf "$tmp"
        # Wrapper execs the real binary by absolute path; a bare symlink breaks
        # resolution of its sibling data files (icudtl.dat, *.pak).
        printf '#!/usr/bin/env bash\nexec "$HOME/.local/chrome-headless-shell/chrome-headless-shell" "$@"\n' > "$HOME/.local/bin/chrome-headless-shell"
        chmod +x "$HOME/.local/bin/chrome-headless-shell"
settings:
  - name: capslock-to-escape
    check: "grep -q 'caps:escape' /etc/default/keyboard"
    scripts:
      linux: |
        sudo sed -i 's/^XKBOPTIONS=.*/XKBOPTIONS="caps:escape"/' /etc/default/keyboard
        sudo dpkg-reconfigure -f noninteractive keyboard-configuration
        sudo udevadm trigger --subsystem-match=input --action=change
  - name: ufw-rules
    check: "sudo ufw status | grep -q '60000:61000/udp'"
    scripts:
      linux: |
        sudo ufw allow ssh
        sudo ufw allow 60000:61000/udp
        sudo ufw --force enable
services: []
